<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FloorplanQA · ICML 2026</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fbfaf6;
    --fg: #0f1411;
    --muted: #6b6f6a;
    --rule: #e2decf;
    --subtle: #f3f0e6;
    --fig-bg: #ffffff;
    --accent: #1f8a4c;
    --accent-fg: #fbfaf6;
    --logo-bg: transparent;
    --logo-pad: 0px;
    --logo-filter: none;
    --serif: "Source Serif 4", "Source Serif Pro", Georgia, serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  html[data-theme="dark"] {
    --bg: #0c0f0d;
    --fg: #ece9df;
    --muted: #8e9189;
    --rule: #23272a;
    --subtle: #13171a;
    --fig-bg: #f5f3ec;
    --accent: #4ade80;
    --accent-fg: #0c0f0d;
    --logo-bg: #ffffff;
    --logo-pad: 10px;
    --logo-filter: invert(1) hue-rotate(180deg);
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    transition: background 200ms ease, color 200ms ease;
  }
  a { color: var(--accent); text-underline-offset: 3px; }
  ::selection { background: var(--accent); color: var(--accent-fg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="paper-page.jsx"></script>
</body>
</html>
